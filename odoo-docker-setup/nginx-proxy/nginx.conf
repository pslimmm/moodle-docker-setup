limit_req_zone $binary_remote_addr zone=odoo_limit:10m rate=5r/s;

# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    server_name <YOUR DNS NAME WITHOUT THE HTTP>;
    return 301 https://$host$request_uri;
}

# 2. HTTPS Server
server {
    listen 443 ssl;
    server_name <YOUR DNS NAME WITHOUT THE HTTP>;

    ssl_certificate     /etc/letsencrypt/live/<YOUR DNS NAME WITHOUT THE HTTP>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR DNS NAME WITHOUT THE HTTP>/privkey.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Increase timeouts for Odoo long-running processes
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme; # Tells Odoo this is HTTPS
    proxy_set_header X-Forwarded-Host $host;

    # Root Location
    location / {
        limit_req zone=odoo_limit burst=10 nodelay;
        proxy_pass http://odoo-app:8069;
        proxy_redirect off;
    }

    # Odoo 17 WebSockets (Prevents 301/404 on /websocket)
    location /websocket {
        proxy_pass http://odoo-app:8069;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }
}