services:
  moodleapp:
    build:
      context: .
      dockerfile: Moodle.Dockerfile
    image: moodleapp:1.0
    container_name: moodleapp
    restart: always
    volumes:
      - moodledata:/var/www/moodledata
      - ./moodle-php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./config.php:/var/www/html/config.php:rw
    depends_on:
      - moodledb
    networks:
      - moodle-net

  # MySQL DB Service
  moodledb:
    image: mysql:8.4.5
    container_name: clouddb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - clouddbdata:/var/lib/mysql
    networks:
      - moodle-net
    # environment:
      # - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      # - MYSQL_DATABASE=${MYSQL_DATABASE}

  nginx-proxy:
    image: nginx:alpine
    container_name: moodle-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - /home/azureuser/nginx-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - moodleapp
    networks:
      - moodle-net

  # phpmyadmin to Manage MySQL DB
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "6767:80"
    environment:
      PMA_ARBRITARY: 1
      PMA_HOST: clouddb
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - moodledb
    networks:
      - moodle-net

volumes:
  clouddbdata:
  moodledata:
  moodleconfig:

networks:
  moodle-net:
    driver: bridge